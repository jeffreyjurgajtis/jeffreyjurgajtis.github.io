<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>
    {% include header.html %}

    <div class="container" id="post">
      <div class="block post">

        <div class="unit span-grid">
          <header class="post-header">
            <h1 class="post-title">{{ page.title }}</h1>

            <p class="post-meta">
              Written on {{ page.date | date: "%B %-d %Y" }}
            </p>
          </header>

          <article class="post-content">
            {{ content }}
          </article>

          {% include footer.html %}
        </div>

      </div>
    </div>

  </body>
</html>
